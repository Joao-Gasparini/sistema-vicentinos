{% extends 'base.html' %}

{% block conteudo %}

<div class="container mt-4">
    <div class="card shadow p-4">
        <h3 class="mb-4 text-center">Editar Perfil</h3>

        <form action="{{ url_for('editar_perfil') }}" method="POST" enctype="multipart/form-data">

             <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- FOTO -->
            <div class="text-center mb-4">
                <div class="position-relative d-inline-block">

                    <img id="preview_foto"
                         src="{{ url_for('static', filename='fotos_perfil/' ~ (usuario.foto if usuario.foto else '')) if usuario.foto else 'https://via.placeholder.com/150' }}"
                         class="rounded-circle border"
                         style="width: 150px; height: 150px; object-fit: cover; cursor: pointer;">

                    <input type="file" name="foto" id="input_foto" accept="image/*" style="display: none;">

                    <div onclick="document.getElementById('input_foto').click()"
                         class="position-absolute top-50 start-50 translate-middle text-white"
                         style="cursor: pointer;">
                        <i class="fas fa-camera fa-2x"></i>
                    </div>
                </div>
                <small class="text-muted d-block mt-2">Clique na imagem para alterar</small>
            </div>

            <!-- NOME -->
            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" value="{{ usuario.nome }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Sobrenome</label>
                <input type="text" name="sobrenome" class="form-control" value="{{ usuario.sobrenome }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">CPF</label>
                <input type="text" class="form-control" value="{{ usuario.cpf }}" readonly>
                <small class="text-muted">
                    Se o CPF estiver incorreto, solicite a correção ao responsável pelo sistema.
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label">Telefone</label>
                <input type="text" name="telefone" id="telefone" class="form-control"
                        value="{{ usuario.telefone or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Conselho</label>
                <input type="text" name="conselho" class="form-control"
                       value="{{ usuario.conselho or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Conferência</label>
                <input type="text" name="conferencia" class="form-control"
                       value="{{ usuario.conferencia or '' }}">
            </div>

            <!-- BOTÃO ALTERAR SENHA -->
            <div class="mb-3 text-center">
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="toggleSenha()">
                    Alterar Senha
                </button>
            </div>

            <!-- CAMPOS DE SENHA -->
            <div id="area_senha" style="display: none;">

                <div class="mb-3">
                    <label class="form-label">Senha Atual</label>
                    <input type="password" name="senha_atual" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nova Senha</label>
                    <input type="password" name="nova_senha" id="nova_senha" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirmar Nova Senha</label>
                    <input type="password" name="confirmar_senha" id="confirmar_senha" class="form-control">
                    <small id="msg_senha" class="text-danger"></small>
                </div>

            </div>

            <!-- BOTÕES -->
            <div class="d-flex justify-content-between mt-4">
                <a href="{{ url_for('perfil') }}" class="btn btn-secondary">
                    Voltar
                </a>

                <button type="submit" class="btn btn-primary">
                    Salvar Alterações
                </button>
            </div>

        </form>
    </div>
</div>

<!-- SCRIPT PREVIEW FOTO -->
<script>
    // =========================
    // FOTO PREVIEW + VALIDAÇÃO
    // =========================
    const inputFoto = document.getElementById('input_foto');

    if (inputFoto) {
        inputFoto.addEventListener('change', function(event) {
            const file = event.target.files[0];

            if (file) {
                const tamanhoMaximo = 5 * 1024 * 1024; // 5MB

                // 🚨 valida tamanho antes de tudo
                if (file.size > tamanhoMaximo) {
                    alert('A imagem é muito grande! Máximo permitido: 5MB.');

                    inputFoto.value = ''; // limpa o input
                    return;
                }

                // ✅ preview normal
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview_foto').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    }

    // =========================
    // MOSTRAR/OCULTAR SENHA
    // =========================
    function toggleSenha() {
        const area = document.getElementById('area_senha');
        area.style.display = area.style.display === 'none' ? 'block' : 'none';
    }

    // =========================
    // SENHA
    // =========================
    const novaSenha = document.getElementById('nova_senha');
    const confirmarSenha = document.getElementById('confirmar_senha');
    const msg = document.getElementById('msg_senha');

    function validarSenha() {
        if (!confirmarSenha.value) {
            msg.textContent = '';
            confirmarSenha.classList.remove('is-valid', 'is-invalid');
            return;
        }

        if (novaSenha.value === confirmarSenha.value) {
            msg.textContent = 'As senhas conferem.';
            msg.className = 'text-success';
            confirmarSenha.classList.add('is-valid');
            confirmarSenha.classList.remove('is-invalid');
        } else {
            msg.textContent = 'As senhas não coincidem.';
            msg.className = 'text-danger';
            confirmarSenha.classList.add('is-invalid');
            confirmarSenha.classList.remove('is-valid');
        }
    }

    if (novaSenha && confirmarSenha) {
        novaSenha.addEventListener("input", validarSenha);
        confirmarSenha.addEventListener("input", validarSenha);
    }

    // =========================
    // TELEFONE
    // =========================
    const telefone = document.getElementById('telefone');

    function aplicarMascaraTelefone(valor) {
        valor = valor.replace(/\D/g, '');

        if (valor.length > 11) {
            valor = valor.slice(0, 11);
        }

        if (valor.length <= 10) {
            valor = valor.replace(/^(\d{2})(\d)/, '($1) $2');
            valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
        } else {
            valor = valor.replace(/^(\d{2})(\d)/, '($1) $2');
            valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
        }

        return valor;
    }

    if (telefone) {
        telefone.addEventListener('input', function () {
            this.value = aplicarMascaraTelefone(this.value);

            const telefoneLimpo = this.value.replace(/\D/g, '');

            if (this.value === '') {
                this.classList.remove('is-valid', 'is-invalid');
            } else if (telefoneLimpo.length === 10 || telefoneLimpo.length === 11) {
                this.classList.add('is-valid');
                this.classList.remove('is-invalid');
            } else {
                this.classList.add('is-invalid');
                this.classList.remove('is-valid');
            }
        });

        telefone.addEventListener('keypress', function (e) {
            const char = String.fromCharCode(e.which);
            if (!/[0-9]/.test(char)) {
                e.preventDefault();
            }
        });
    }

    // =========================
    // BLOQUEAR NÚMEROS NO NOME
    // =========================
    function permitirApenasLetras(event) {
        const char = String.fromCharCode(event.which);
        if (!/[A-Za-zÀ-ÿ\s\-]/.test(char)) {
            event.preventDefault();
        }
    }

    const inputNome = document.querySelector('input[name="nome"]');
    const inputSobrenome = document.querySelector('input[name="sobrenome"]');

    if (inputNome) inputNome.addEventListener('keypress', permitirApenasLetras);
    if (inputSobrenome) inputSobrenome.addEventListener('keypress', permitirApenasLetras);

    // =========================
    // SUBMIT (VALIDAÇÃO FINAL)
    // =========================
    const form = document.querySelector('form');

    form.addEventListener('submit', function (e) {
        const telefoneLimpo = telefone ? telefone.value.replace(/\D/g, '') : '';

        // telefone
        if (telefone && telefone.value && telefoneLimpo.length !== 10 && telefoneLimpo.length !== 11) {
            e.preventDefault();
            telefone.classList.add('is-invalid');
            alert('Informe um telefone válido com DDD.');
            return;
        }

        // senha opcional
        if (novaSenha.value || confirmarSenha.value) {

            if (novaSenha.value.length < 6) {
                e.preventDefault();
                novaSenha.classList.add('is-invalid');
                alert('A senha deve ter pelo menos 6 caracteres.');
                return;
            }

            if (novaSenha.value !== confirmarSenha.value) {
                e.preventDefault();
                msg.textContent = 'As senhas não coincidem.';
                msg.className = 'text-danger';
                confirmarSenha.classList.add('is-invalid');
                alert('As senhas não conferem.');
                return;
            }
        }
    });
</script>

{% endblock %}
