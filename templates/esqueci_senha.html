{% extends 'base.html' %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Recuperar senha</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-warning w-100">
                        Enviar link de redefinição
                    </button>
                </form>

                {% if email_pendente %}
                    <div class="alert alert-info mt-3">
                        Se o e-mail estiver cadastrado, o link foi enviado para:
                        <strong>{{ email_pendente }}</strong>
                    </div>

                    <form method="POST" action="{{ url_for('reenviar_redefinicao') }}" class="mt-2">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="hidden" name="email" value="{{ email_pendente }}">

                        <button type="submit" id="btnReenviarRedefinicao" class="btn btn-outline-warning w-100" {% if tempo_restante > 0 %}disabled{% endif %}>
                            {% if tempo_restante > 0 %}
                                Reenviar em <span id="contadorRedefinicao">{{ tempo_restante }}</span>s
                            {% else %}
                                Reenviar e-mail de redefinição
                            {% endif %}
                        </button>
                    </form>

                    <script>
                        let tempoRestante = {{ tempo_restante|default(0) }};
                        const botao = document.getElementById('btnReenviarRedefinicao');
                        const contador = document.getElementById('contadorRedefinicao');

                        if (tempoRestante > 0) {
                            const intervalo = setInterval(() => {
                                tempoRestante--;

                                if (contador) {
                                    contador.textContent = tempoRestante;
                                }

                                if (tempoRestante <= 0) {
                                    clearInterval(intervalo);
                                    botao.disabled = false;
                                    botao.innerHTML = 'Reenviar e-mail de redefinição';
                                }
                            }, 1000);
                        }
                    </script>
                {% endif %}

                <hr>
                <p class="text-center mb-0">
                    <a href="{{ url_for('login') }}">Voltar para o login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
