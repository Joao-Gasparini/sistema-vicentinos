{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h3 class="mb-4">Cadastrar Vicentino</h3>

    <form method="POST" enctype="multipart/form-data">
        {{ csrf_token() }}

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Nome</label>
                <input type="text" name="nome" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Sobrenome</label>
                <input type="text" name="sobrenome" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Telefone</label>
                <input type="text" name="telefone" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>CPF</label>
                <input type="text" name="cpf" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Conselho</label>
                <input type="text" name="conselho" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Conferência</label>
                <input type="text" name="conferencia" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Foto</label>
                <input type="file" name="foto" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Confirmar Senha</label>
                <input type="password" name="confirmar_senha" class="form-control" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Cadastrar</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Voltar</a>
    </form>
</div>
{% endblock %}
