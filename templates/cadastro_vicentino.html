{% extends 'base.html' %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-header text-white" style="background-color: #0064b6;">
                <h4 class="mb-0">Cadastro de Vicentino</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" id="form-cadastro">

                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- FOTO DE PERFIL -->
                    <div class="text-center mb-4">
                        <label class="form-label d-block">Foto de Perfil</label>

                        <div id="avatar_placeholder"
                             class="rounded-circle mb-2 border bg-light text-secondary"
                             style="width: 120px; height: 120px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;"
                             onclick="document.getElementById('input_foto').click()">
                            <i class="fa-solid fa-user fa-3x"></i>
                        </div>
                        <img id="preview_foto"
                             src=""
                             class="rounded-circle mb-2 border"
                             style="width: 120px; height: 120px; object-fit: cover; cursor: pointer; display: none;"
                             alt="Prévia da foto"
                             onclick="document.getElementById('input_foto').click()">

                        <input type="file" name="foto" id="input_foto" accept="image/*" style="display: none;">

                        <br>
                        <button type="button"
                                class="btn btn-outline-secondary btn-sm mt-2"
                                onclick="document.getElementById('input_foto').click()">
                            Escolher Foto
                        </button>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome*</label>
                            <input
                                type="text"
                                name="nome"
                                class="form-control"
                                required
                                pattern="[A-Za-zÀ-ÿ\s]+"
                                title="Digite apenas letras"
                                oninput="this.value = this.value.replace(/[^A-Za-zÀ-ÿ\s]/g, '')"
                            >
                            <div class="invalid-feedback">
                                Digite apenas letras no nome.
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sobrenome*</label>
                            <input
                                type="text"
                                name="sobrenome"
                                class="form-control"
                                required
                                pattern="[A-Za-zÀ-ÿ\s]+"
                                title="Digite apenas letras"
                                oninput="this.value = this.value.replace(/[^A-Za-zÀ-ÿ\s]/g, '')"
                            >
                            <div class="invalid-feedback">
                                Digite apenas letras no sobrenome.
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CPF</label>
                            <input type="text" name="cpf" id="cpf" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Telefone</label>
                            <input
                                type="text"
                                name="telefone"
                                id="telefone"
                                class="form-control"
                                maxlength="15"
                                inputmode="numeric"
                                autocomplete="off"
                                placeholder="Digite o telefone com DDD"
                            >
                            <div class="invalid-feedback">
                                Informe um telefone válido com DDD.
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Conselho Particular</label>
                            <select name="conselho_id" class="form-select select2" id="conselho_id">
                                <option value="">Selecione um conselho...</option>
                                {% for c in conselhos %}
                                    <option value="{{ c.id }}">{{ c.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Conferência</label>
                            <select name="conferencia_id" class="form-select select2" id="conferencia_id">
                                <option value="">Selecione um conselho primeiro...</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">E-mail*(opcional)</label>
                        <input
                            type="email"
                            name="email"
                            id="email"
                            class="form-control"
                            placeholder="exemplo@email.com"
                        >
                        <div id="email-feedback" class="invalid-feedback">
                            E-mail inválido.
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Senha *</label>
                            <input
                                type="password"
                                name="senha"
                                id="senha"
                                class="form-control"
                                required
                                minlength="6"
                            >
                            <div id="requisitos-senha" class="form-text">
                                A senha deve conter pelo menos 6 caracteres.
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Confirmar senha *</label>
                            <input
                                type="password"
                                name="confirmar_senha"
                                id="confirmar_senha"
                                class="form-control"
                                required
                                minlength="6"
                            >
                            <div id="mensagem-senha" class="form-text"></div>
                        </div>
                    </div>

                    <button type="submit" class="btn w-100 text-white" style="background-color: #0064b6; border-color: #0064b6;">Cadastrar</button>
                </form>

                <hr>
            </div>
        </div>
    </div>
</div>

{% block scripts %}
<style>
    .select2-container--default .select2-selection--single {
        height: calc(1.5em + 0.75rem + 2px);
        padding: 0.375rem 0.75rem;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
    }
    .select2-container--default .select2-selection--single .select2-selection__rendered {
        line-height: 1.5;
        padding-left: 0;
        color: #212529;
    }
    .select2-container--default .select2-selection--single .select2-selection__arrow {
        height: calc(1.5em + 0.75rem + 2px);
    }
    .select2-container--default .select2-selection--single .select2-selection__placeholder {
        color: #6c757d;
    }
</style>
<script>
$(document).ready(function () {

    $('#conselho_id').select2({
        placeholder: "Digite para buscar...",
        allowClear: true,
        width: '100%'
    });

    $('#conferencia_id').select2({
        placeholder: "Selecione um conselho primeiro...",
        allowClear: true,
        width: '100%'
    });

    let xhrConferencias = null;

    $('#conselho_id').on('change.select2', function () {
        if (xhrConferencias) { xhrConferencias.abort(); xhrConferencias = null; }

        const conselhoId = $(this).val();
        const $conferencia = $('#conferencia_id');

        if (!conselhoId) {
            $conferencia.empty().append('<option value="">Selecione um conselho primeiro...</option>').trigger('change');
            return;
        }

        $conferencia.empty().append('<option value="">Carregando...</option>').trigger('change');

        xhrConferencias = $.getJSON(`/api/conferencias/${conselhoId}`, function (data) {
            xhrConferencias = null;
            $conferencia.empty().append('<option value="">Selecione uma conferência...</option>');

            if (data.length === 0) {
                $conferencia.append('<option value="" disabled>Nenhuma conferência encontrada</option>');
            } else {
                data.forEach(function (c) {
                    $conferencia.append(`<option value="${c.id}">${c.nome}</option>`);
                });
            }

            $conferencia.trigger('change');
        });
    });

});
</script>

<script>
    const senha = document.getElementById('senha');
    const confirmarSenha = document.getElementById('confirmar_senha');
    const mensagemSenha = document.getElementById('mensagem-senha');
    const requisitosSenha = document.getElementById('requisitos-senha');
    const formCadastro = document.getElementById('form-cadastro');
    const telefone = document.getElementById('telefone');
    const emailInput = document.getElementById('email');

    function validarForcaSenha() {
        const valor = senha.value;

        if (valor === '') {
            senha.classList.remove('is-valid', 'is-invalid');
            requisitosSenha.className = 'form-text';
            requisitosSenha.textContent = 'A senha deve conter pelo menos 6 caracteres.';
            return;
        }

        if (valor.length >= 6) {
            senha.classList.add('is-valid');
            senha.classList.remove('is-invalid');
            requisitosSenha.className = 'form-text text-success';
            requisitosSenha.textContent = 'Senha válida ✔';
        } else {
            senha.classList.add('is-invalid');
            senha.classList.remove('is-valid');
            requisitosSenha.className = 'form-text text-danger';
            requisitosSenha.textContent = 'A senha deve conter pelo menos 6 caracteres.';
        }
    }

    function validarSenhas() {
        if (confirmarSenha.value === '') {
            mensagemSenha.textContent = '';
            mensagemSenha.className = 'form-text';
            confirmarSenha.classList.remove('is-valid', 'is-invalid');
            return;
        }

        if (senha.value === confirmarSenha.value) {
            mensagemSenha.textContent = 'As senhas conferem.';
            mensagemSenha.className = 'form-text text-success';
            confirmarSenha.classList.add('is-valid');
            confirmarSenha.classList.remove('is-invalid');
        } else {
            mensagemSenha.textContent = 'As senhas não conferem.';
            mensagemSenha.className = 'form-text text-danger';
            confirmarSenha.classList.add('is-invalid');
            confirmarSenha.classList.remove('is-valid');
        }
    }

    function aplicarMascaraTelefone(valor) {
        valor = valor.replace(/\D/g, '');

        if (valor.length > 11) {
            valor = valor.slice(0, 11);
        }

        if (valor.length <= 10) {
            valor = valor.replace(/^(\d{2})(\d)/, '($1) $2');
            valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
        } else {
            valor = valor.replace(/^(\d{2})(\d)/, '($1) $2');
            valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
        }

        return valor;
    }

    telefone.addEventListener('input', function () {
        this.value = aplicarMascaraTelefone(this.value);

        const telefoneLimpo = this.value.replace(/\D/g, '');
        if (this.value === '') {
            this.classList.remove('is-valid', 'is-invalid');
        } else if (telefoneLimpo.length === 10 || telefoneLimpo.length === 11) {
            this.classList.remove('is-invalid');
            this.classList.add('is-valid');
        } else {
            this.classList.remove('is-valid');
            this.classList.add('is-invalid');
        }
    });

    telefone.addEventListener('keypress', function (e) {
        const char = String.fromCharCode(e.which);
        if (!/[0-9]/.test(char)) {
            e.preventDefault();
        }
    });

    emailInput.addEventListener('input', function () {
        const email = emailInput.value.trim();
        const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (email === '') {
            emailInput.classList.remove('is-valid', 'is-invalid');
        } else if (regexEmail.test(email)) {
            emailInput.classList.remove('is-invalid');
            emailInput.classList.add('is-valid');
        } else {
            emailInput.classList.remove('is-valid');
            emailInput.classList.add('is-invalid');
        }
    });

    senha.addEventListener('input', function () {
        validarForcaSenha();
        validarSenhas();
    });

    confirmarSenha.addEventListener('input', validarSenhas);

    formCadastro.addEventListener('submit', function (e) {
        const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        const emailValor = emailInput.value.trim();
        const telefoneLimpo = telefone.value.replace(/\D/g, '');

        if (emailValor !== '' && !regexEmail.test(emailValor)) {
            e.preventDefault();
            emailInput.classList.add('is-invalid');
            emailInput.classList.remove('is-valid');
            alert('Informe um e-mail válido.');
            return;
        }

        if (telefone.value && telefoneLimpo.length !== 10 && telefoneLimpo.length !== 11) {
            e.preventDefault();
            telefone.classList.add('is-invalid');
            telefone.classList.remove('is-valid');
            alert('Informe um telefone válido com DDD.');
            return;
        }

        if (senha.value.length < 6) {
            e.preventDefault();
            senha.classList.add('is-invalid');
            senha.classList.remove('is-valid');
            alert('A senha deve ter pelo menos 6 caracteres.');
            return;
        }

        if (senha.value !== confirmarSenha.value) {
            e.preventDefault();
            mensagemSenha.textContent = 'As senhas não conferem.';
            mensagemSenha.className = 'form-text text-danger';
            confirmarSenha.classList.add('is-invalid');
            confirmarSenha.classList.remove('is-valid');
            alert('As senhas não conferem.');
            return;
        }
    });

    // =========================
    // FOTO PREVIEW + VALIDAÇÃO
    // =========================
    document.getElementById('input_foto').addEventListener('change', function(event) {
        const file = event.target.files[0];
        const img = document.getElementById('preview_foto');
        const placeholder = document.getElementById('avatar_placeholder');

        if (file) {
            const tamanhoMaximo = 5 * 1024 * 1024; // 5MB

            if (file.size > tamanhoMaximo) {
                alert('A imagem é muito grande! Máximo permitido: 5MB.');
                this.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
                img.style.display = 'inline-block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });


    const cpf = document.getElementById('cpf');

function aplicarMascaraCPF(valor) {
    valor = valor.replace(/\D/g, '');

    if (valor.length > 11) {
        valor = valor.slice(0, 11);
    }

    valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
    valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
    valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

    return valor;
}

if (cpf) {
    cpf.addEventListener('input', function () {
        this.value = aplicarMascaraCPF(this.value);
    });

    cpf.addEventListener('keypress', function (e) {
        const char = String.fromCharCode(e.which);
        if (!/[0-9]/.test(char)) {
            e.preventDefault();
        }
    });
}
</script>
{% endblock %}
{% endblock %}
