{% extends 'base.html' %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-header text-white" style="background-color: #0064b6;">
                <h4 class="mb-0">Editar Vicentino</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome *</label>
                            <input type="text" name="nome" class="form-control"
                                   value="{{ usuario.nome }}" required
                                   pattern="[A-Za-zÀ-ÿ\s]+"
                                   oninput="this.value = this.value.replace(/[^A-Za-zÀ-ÿ\s]/g, '')">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sobrenome *</label>
                            <input type="text" name="sobrenome" class="form-control"
                                   value="{{ usuario.sobrenome }}" required
                                   pattern="[A-Za-zÀ-ÿ\s]+"
                                   oninput="this.value = this.value.replace(/[^A-Za-zÀ-ÿ\s]/g, '')">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CPF</label>
                            <input type="text" name="cpf" id="cpf" class="form-control"
                                   value="{{ usuario.cpf or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Telefone</label>
                            <input type="text" name="telefone" id="telefone" class="form-control"
                                   value="{{ usuario.telefone or '' }}"
                                   maxlength="15" inputmode="numeric" autocomplete="off"
                                   placeholder="Digite o telefone com DDD">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Conselho Particular</label>
                            <select name="conselho_id" id="conselho_id" class="form-select select2">
                                <option value="">Selecione um conselho...</option>
                                {% for c in conselhos %}
                                    <option value="{{ c.id }}"
                                        {% if usuario.conselho_id == c.id %}selected{% endif %}>
                                        {{ c.nome }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Conferência</label>
                            <select name="conferencia_id" id="conferencia_id" class="form-select select2">
                                <option value="">Selecione um conselho primeiro...</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-2">
                        <button type="submit" class="btn text-white"
                                style="background-color: #0064b6; border-color: #0064b6;">
                            Salvar
                        </button>
                        <a href="{{ url_for('listar_vicentinos') }}" class="btn btn-secondary">
                            Voltar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% block scripts %}
<script>
$(document).ready(function () {

    const conferenciaAtualId = {{ usuario.conferencia_id | tojson }};
    let prontoParaMudar = false;

    $('#conselho_id').select2({
        placeholder: "Digite para buscar...",
        allowClear: true,
        width: '100%'
    });

    $('#conferencia_id').select2({
        placeholder: "Selecione um conselho primeiro...",
        allowClear: true,
        width: '100%'
    });

    let xhrConferencias = null;

    function carregarConferencias(conselhoId, preselecionarId) {
        if (xhrConferencias) { xhrConferencias.abort(); xhrConferencias = null; }

        const $conferencia = $('#conferencia_id');

        if (!conselhoId) {
            $conferencia.empty()
                .append('<option value="">Selecione um conselho primeiro...</option>')
                .trigger('change');
            return;
        }

        $conferencia.empty().append('<option value="">Carregando...</option>').trigger('change');

        xhrConferencias = $.getJSON(`/api/conferencias/${conselhoId}`, function (data) {
            xhrConferencias = null;
            $conferencia.empty().append('<option value="">Selecione uma conferência...</option>');

            if (data.length === 0) {
                $conferencia.append('<option value="" disabled>Nenhuma conferência encontrada</option>');
            } else {
                data.forEach(function (c) {
                    const selected = (preselecionarId && c.id === preselecionarId) ? 'selected' : '';
                    $conferencia.append(`<option value="${c.id}" ${selected}>${c.nome}</option>`);
                });
            }

            $conferencia.trigger('change');
        });
    }

    // Só recarrega quando o usuário mudar o conselho (ignora o evento disparado pelo Select2 na inicialização)
    $('#conselho_id').on('change.select2', function () {
        if (!prontoParaMudar) return;
        carregarConferencias($(this).val(), null);
    });

    // Carga inicial: carrega as conferências do conselho atual e pré-seleciona
    const conselhoInicial = $('#conselho_id').val();
    if (conselhoInicial) {
        carregarConferencias(conselhoInicial, conferenciaAtualId);
    }
    prontoParaMudar = true;

});
</script>

<script>
    // Máscara CPF
    const cpf = document.getElementById('cpf');
    function aplicarMascaraCPF(valor) {
        valor = valor.replace(/\D/g, '').slice(0, 11);
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        return valor;
    }
    if (cpf) {
        cpf.addEventListener('input', function () {
            this.value = aplicarMascaraCPF(this.value);
        });
        cpf.addEventListener('keypress', function (e) {
            if (!/[0-9]/.test(String.fromCharCode(e.which))) e.preventDefault();
        });
    }

    // Máscara Telefone
    const telefone = document.getElementById('telefone');
    function aplicarMascaraTelefone(valor) {
        valor = valor.replace(/\D/g, '').slice(0, 11);
        if (valor.length <= 10) {
            valor = valor.replace(/^(\d{2})(\d)/, '($1) $2');
            valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
        } else {
            valor = valor.replace(/^(\d{2})(\d)/, '($1) $2');
            valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
        }
        return valor;
    }
    if (telefone) {
        telefone.addEventListener('input', function () {
            this.value = aplicarMascaraTelefone(this.value);
        });
        telefone.addEventListener('keypress', function (e) {
            if (!/[0-9]/.test(String.fromCharCode(e.which))) e.preventDefault();
        });
    }
</script>
{% endblock %}
{% endblock %}
