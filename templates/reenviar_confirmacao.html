{% extends 'base.html' %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header text-white" style="background-color: #0064B6;">
                <h4 class="mb-0">Reenviar confirmação de e-mail</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Reenviar confirmação</button>
                </form>

                <hr>
                <p class="text-center mb-0">
                    <a href="{{ url_for('login') }}">Voltar para o login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
